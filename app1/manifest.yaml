apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  #thse labels are replicaset labels
  labels:
   project: roboshop
   tier: frontend 
   component: app1

spec: 
  replicas: 2
  selector:
    matchLabels: 
      project: roboshop
      tier: frontend
      component: app1
     # This is pod definition, pod is subset of replicaset
  template: 
    metadata: 
      labels: 
        project: roboshop
        tier: frontend
        component: app1
    
    spec: 
      containers: 
      - name: nginx
        image: satishlakamsani/app1:1.0.0



---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec: 
 selector: 
   #labels are used as selectors
   project: roboshop
   tier: frontend
   component: app1
 ports: 
 - protocol: TCP
   port: 80 #service port 
   targetPort: 80 #container port
