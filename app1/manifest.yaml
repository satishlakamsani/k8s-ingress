apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  #thse labels are replicaset labels
  labels:
   project: roboshop
   tier: frontend 
   component: app1

spec: 
  replicas: 2
  selector:
    matchLabels: 
      project: roboshop
      tier: frontend
      component: app1
     # This is pod definition, pod is subset of replicaset
  template: 
    metadata: 
      labels: 
        project: roboshop
        tier: frontend
        component: app1
    
    spec: 
      containers: 
      - name: app1
        image: satishlakamsani/app1:1.0.1



---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec: 
 selector: 
   #labels are used as selectors
   project: roboshop
   tier: frontend
   component: app1
 ports: 
 - protocol: TCP
   port: 80 #service port 
   targetPort: 80 #container port

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: 'arn:aws:acm:us-east-1:851974187100:certificate/ce79943a-5527-4c50-9a6b-9016f301f7cd'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: roboshop
spec:
  ingressClassName: alb
  rules:
  - host: "app1.pugasaha.online"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80
 